<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>网页版俄罗斯方块</title>
    <style>
        /* 整体样式 */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
            font-family: Arial, sans-serif;
        }

        /* 游戏容器（游戏区+得分区） */
        .game-container {
            display: flex;
            gap: 30px;
            align-items: flex-start;
        }

        /* 游戏画布（核心区域） */
        #tetrisCanvas {
            border: 3px solid #333;
            background-color: #fff;
        }

        /* 得分和提示区域 */
        .info-panel {
            text-align: center;
        }

        .score-text {
            font-size: 28px;
            margin-bottom: 20px;
            color: #333;
        }

        /* 重新开始按钮 */
        #restartBtn {
            padding: 10px 20px;
            font-size: 18px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        #restartBtn:hover {
            background-color: #45a049;
        }

        /* 游戏结束提示 */
        .game-over {
            position: absolute;
            font-size: 40px;
            color: red;
            font-weight: bold;
            text-shadow: 2px 2px 2px #fff;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <!-- 游戏画布（JS会在这里绘制方块） -->
        <canvas id="tetrisCanvas" width="300" height="600"></canvas>
        
        <!-- 得分和按钮区域 -->
        <div class="info-panel">
            <div class="score-text">得分: <span id="score">0</span></div>
            <button id="restartBtn" onclick="restartGame()">重新开始</button>
        </div>
    </div>

    <script>
        // ===================== 游戏核心配置 =====================
        const canvas = document.getElementById('tetrisCanvas');
        const ctx = canvas.getContext('2d'); // 获取画布绘制上下文
        const scoreElement = document.getElementById('score');

        // 方块大小（每个小格子的像素）
        const BLOCK_SIZE = 30;
        // 游戏区域网格尺寸（列数×行数）
        const COLS = 10;
        const ROWS = 20;
        // 颜色映射（不同形状的方块对应不同颜色）
        const COLORS = [
            null, // 索引0不用（形状从1开始）
            '#FF0000', // 红色（I型）
            '#00FF00', // 绿色（O型）
            '#0000FF', // 蓝色（T型）
            '#FFFF00', // 黄色（L型）
            '#FF00FF', // 紫色（J型）
            '#00FFFF', // 青色（S型）
            '#FFA500'  // 橙色（Z型）
        ];

        // 7种经典俄罗斯方块形状（0=空，1=方块）
        const SHAPES = [
            [], // 索引0不用
            // I型
            [[1, 1, 1, 1]],
            // O型
            [[1, 1], [1, 1]],
            // T型
            [[0, 1, 0], [1, 1, 1]],
            // L型
            [[0, 0, 1], [1, 1, 1]],
            // J型
            [[1, 0, 0], [1, 1, 1]],
            // S型
            [[0, 1, 1], [1, 1, 0]],
            // Z型
            [[1, 1, 0], [0, 1, 1]]
        ];

        // ===================== 游戏状态变量 =====================
        let board = []; // 游戏区域网格（存储每个格子的颜色索引）
        let currentPiece = null; // 当前下落的方块
        let currentX = 0; // 当前方块的X坐标（列）
        let currentY = 0; // 当前方块的Y坐标（行）
        let score = 0; // 得分
        let gameOver = false; // 游戏结束标记
        let gameInterval; // 自动下落的定时器

        // ===================== 初始化函数 =====================
        function initGame() {
            // 初始化游戏网格（全部置0，代表空）
            board = Array(ROWS).fill().map(() => Array(COLS).fill(0));
            score = 0;
            scoreElement.textContent = score;
            gameOver = false;

            // 生成第一个方块
            spawnPiece();

            // 清除旧的定时器，设置新的自动下落（每1秒下落一格）
            clearInterval(gameInterval);
            gameInterval = setInterval(() => {
                if (!gameOver) moveDown();
            }, 1000);
        }

        // ===================== 生成新方块 =====================
        function spawnPiece() {
            // 随机选一个形状（1-7）
            const shapeIndex = Math.floor(Math.random() * 7) + 1;
            currentPiece = SHAPES[shapeIndex];
            // 初始位置：水平居中，垂直置顶
            currentX = Math.floor((COLS - currentPiece[0].length) / 2);
            currentY = 0;

            // 检查新方块是否和已有方块重叠（游戏结束条件）
            if (checkCollision(currentPiece, currentX, currentY)) {
                gameOver = true;
                clearInterval(gameInterval);
                // 绘制游戏结束提示
                ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
                ctx.fillRect(0, canvas.height/2 - 50, canvas.width, 100);
                ctx.fillStyle = 'red';
                ctx.font = '40px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('游戏结束!', canvas.width/2, canvas.height/2 + 10);
                ctx.textAlign = 'left';
            }

            // 重新绘制游戏画面
            drawGame();
        }

        // ===================== 碰撞检测 =====================
        function checkCollision(piece, x, y) {
            // 遍历方块的每个格子
            for (let row = 0; row < piece.length; row++) {
                for (let col = 0; col < piece[row].length; col++) {
                    if (piece[row][col]) { // 只检查方块的有效格子
                        const newX = x + col;
                        const newY = y + row;
                        // 碰撞条件：超出左右边界、超出下边界、和已有方块重叠
                        if (
                            newX < 0 || newX >= COLS || 
                            newY >= ROWS || 
                            (newY >= 0 && board[newY][newX])
                        ) {
                            return true; // 碰撞
                        }
                    }
                }
            }
            return false; // 无碰撞
        }

        // ===================== 绘制游戏画面 =====================
        function drawGame() {
            // 1. 清空画布
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 2. 绘制游戏区域已有方块
            for (let row = 0; row < ROWS; row++) {
                for (let col = 0; col < COLS; col++) {
                    const colorIndex = board[row][col];
                    if (colorIndex) {
                        drawBlock(col * BLOCK_SIZE, row * BLOCK_SIZE, COLORS[colorIndex]);
                    }
                }
            }

            // 3. 绘制当前下落的方块
            if (currentPiece) {
                const colorIndex = SHAPES.indexOf(currentPiece);
                for (let row = 0; row < currentPiece.length; row++) {
                    for (let col = 0; col < currentPiece[row].length; col++) {
                        if (currentPiece[row][col]) {
                            drawBlock(
                                (currentX + col) * BLOCK_SIZE,
                                (currentY + row) * BLOCK_SIZE,
                                COLORS[colorIndex]
                            );
                        }
                    }
                }
            }
        }

        // ===================== 绘制单个方块 =====================
        function drawBlock(x, y, color) {
            // 绘制方块填充色
            ctx.fillStyle = color;
            ctx.fillRect(x, y, BLOCK_SIZE - 1, BLOCK_SIZE - 1); // -1留缝隙，更清晰
            // 绘制方块边框
            ctx.strokeStyle = '#333';
            ctx.strokeRect(x, y, BLOCK_SIZE - 1, BLOCK_SIZE - 1);
        }

        // ===================== 固定方块到网格 =====================
        function lockPiece() {
            const colorIndex = SHAPES.indexOf(currentPiece);
            for (let row = 0; row < currentPiece.length; row++) {
                for (let col = 0; col < currentPiece[row].length; col++) {
                    if (currentPiece[row][col]) {
                        const newY = currentY + row;
                        if (newY >= 0) { // 避免负数行（方块还在顶部外）
                            board[newY][currentX + col] = colorIndex;
                        }
                    }
                }
            }

            // 检查并消除满行
            clearLines();
            // 生成新方块
            spawnPiece();
        }

        // ===================== 消除满行 =====================
        function clearLines() {
            let linesCleared = 0;
            // 从下往上遍历每一行
            for (let row = ROWS - 1; row >= 0; row--) {
                // 检查该行是否填满
                if (board[row].every(cell => cell !== 0)) {
                    linesCleared++;
                    // 删除当前行，在顶部新增一行空行
                    board.splice(row, 1);
                    board.unshift(Array(COLS).fill(0));
                    // 行删除后，row要加1（因为数组长度变了，避免漏检）
                    row++;
                }
            }

            // 根据消除的行数加分（消1行+100，消2行+200，以此类推）
            if (linesCleared > 0) {
                score += linesCleared * 100;
                scoreElement.textContent = score;
            }
        }

        // ===================== 方块移动控制 =====================
        function moveLeft() {
            if (!gameOver && !checkCollision(currentPiece, currentX - 1, currentY)) {
                currentX--;
                drawGame();
            }
        }

        function moveRight() {
            if (!gameOver && !checkCollision(currentPiece, currentX + 1, currentY)) {
                currentX++;
                drawGame();
            }
        }

        function moveDown() {
            if (!gameOver) {
                // 检测是否能下落
                if (!checkCollision(currentPiece, currentX, currentY + 1)) {
                    currentY++;
                } else {
                    // 不能下落，固定方块
                    lockPiece();
                }
                drawGame();
            }
        }

        // ===================== 方块旋转控制 =====================
        function rotatePiece() {
            if (gameOver) return;

            // 旋转逻辑：转置矩阵 + 反转每行
            const rotated = currentPiece[0].map((_, index) => 
                currentPiece.map(row => row[index]).reverse()
            );

            // 检测旋转后是否碰撞，无碰撞则应用旋转
            if (!checkCollision(rotated, currentX, currentY)) {
                currentPiece = rotated;
                drawGame();
            }
        }

        // ===================== 重新开始游戏 =====================
        function restartGame() {
            initGame();
        }

        // ===================== 键盘事件监听 =====================
        document.addEventListener('keydown', (e) => {
            switch (e.key) {
                case 'ArrowLeft': moveLeft(); break;
                case 'ArrowRight': moveRight(); break;
                case 'ArrowDown': moveDown(); break;
                case 'ArrowUp': rotatePiece(); break;
            }
        });

        // 初始化游戏（页面加载后自动启动）
        window.onload = initGame;
    </script>
</body>
</html>
